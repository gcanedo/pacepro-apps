<style>
:root{
  --bg:#071015;--panel:#0f1b21;--border:#263942;--ink:#f2f7f8;--muted:#a7b5bc;
  --accent:#ff6a1a;--amber:#ffb31f;--cyan:#17d1e0;--good:#22c55e;--bad:#ef4444;
}
html.day{
  --bg:#f4f4f2;--panel:#ffffff;--border:#d5d9d6;--ink:#101413;--muted:#5a6663;
  --accent:#e75410;--amber:#a16207;--cyan:#0e7490;--good:#15803d;--bad:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  overflow:hidden;
  /* race app: no text selection / iOS callout bubbles on any control */
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}
/* ---------- MAP: the default, full-screen view ---------- */
#map{position:fixed;inset:0;width:100%;height:100%;touch-action:none;background:#0a1216}
.cbtn{position:fixed;z-index:8;width:46px;height:46px;border-radius:50%;
  background:rgba(13,17,20,.88);color:#fff;border:1px solid rgba(255,255,255,.18);
  font-size:21px;line-height:44px;text-align:center;font-weight:800;font-family:inherit;
  box-shadow:0 2px 8px rgba(0,0,0,.35)}
#cards-btn{left:10px;top:calc(10px + env(safe-area-inset-top,0px))}
#center-btn{right:10px;top:calc(10px + env(safe-area-inset-top,0px))}
#voice-btn{right:10px;top:calc(66px + env(safe-area-inset-top,0px));font-size:17px}
#legpill{position:fixed;left:50%;transform:translateX(-50%);bottom:320px;z-index:7;max-width:86vw;
  background:#fff;color:#1d3f8f;border:1px solid #d8dce2;border-radius:999px;
  padding:7px 14px;font-weight:800;font-size:14px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#legpill .nm{min-width:0;overflow:hidden;text-overflow:ellipsis}
#legpill .dist{flex:0 0 auto}
#tile-status{position:fixed;left:10px;bottom:322px;z-index:7;font-size:10px;color:#cdd6dc;
  background:rgba(13,17,20,.7);padding:2px 7px;border-radius:8px}
#breakchip{position:fixed;left:50%;transform:translateX(-50%);z-index:30;display:none;
  top:calc(14px + env(safe-area-inset-top,0px));
  background:rgba(13,15,18,.94);color:var(--amber);border:1px solid rgba(255,179,31,.55);
  border-radius:999px;padding:8px 16px;font-weight:800;font-size:16px;
  font-variant-numeric:tabular-nums;box-shadow:0 2px 10px rgba(0,0,0,.4);white-space:nowrap}
#breakchip.over{color:#fff;background:#c62828;border-color:#e57373}
/* sweat-proof touch lock: invisible full-screen shield + transient hint */
#lockshield{position:fixed;inset:0;z-index:40;display:none;touch-action:none;background:transparent}
#lockhint{position:fixed;left:50%;top:38%;transform:translateX(-50%);z-index:41;
  background:rgba(13,15,18,.92);color:#fff;border-radius:999px;padding:10px 18px;
  font-weight:800;font-size:14px;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap}
#lockhint.on{opacity:1}
#panel{position:fixed;left:0;right:0;bottom:0;z-index:6;background:#0d0f12;
  border-radius:18px 18px 0 0;padding:0 10px calc(10px + env(safe-area-inset-bottom,0px));
  box-shadow:0 -4px 18px rgba(0,0,0,.45)}
#prof{display:block;width:100%;height:96px;border-radius:12px 12px 0 0;margin-top:10px;
  border-top:3px solid var(--amber)}
#paceband{background:#000;border-radius:0 0 12px 12px;padding:8px 10px 10px;cursor:pointer;
  user-select:none;-webkit-user-select:none}
#paceband .head{display:flex;justify-content:space-between;align-items:center;gap:8px;
  font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--amber)}
#paceband .head #scopename{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#paceband .head .clock{color:#9aa3ab;font-variant-numeric:tabular-nums;letter-spacing:0;flex:0 0 auto}
#paceband .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:2px}
#paceband .col{text-align:center;min-width:0}
#paceband .col b{display:block;font-size:33px;font-weight:800;color:#fff;
  font-variant-numeric:tabular-nums;line-height:1.05}
#paceband .col span{display:block;font-size:10px;color:#9aa3ab;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
#controls{display:flex;gap:10px;margin-top:10px;align-items:center}
.ctl{flex:1;appearance:none;border:none;border-radius:999px;padding:15px 12px;
  font-size:17px;font-weight:800;font-family:inherit}
.ctl.orange{background:var(--accent);color:#fff}
.ctl.white{background:#fff;color:#111}
.ctl.ghost{background:transparent;color:#9aa3ab;font-size:12px;flex:0 0 auto;padding:8px 12px}
/* ---------- CARDS: logistics & nutrition, opened from the map ---------- */
#cards{position:fixed;inset:0;z-index:20;display:none;background:var(--bg)}
body.cards #cards{display:block}
#map-btn{right:10px;top:calc(10px + env(safe-area-inset-top,0px));z-index:27}
#deck{
  display:flex;height:100dvh;width:100vw;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;scrollbar-width:none;
}
#deck::-webkit-scrollbar{display:none}
#deck.dragging{scroll-snap-type:none;cursor:grabbing}
.card{
  min-width:100vw;height:100dvh;scroll-snap-align:start;
  padding:max(14px,env(safe-area-inset-top)) 18px max(46px,calc(30px + env(safe-area-inset-bottom)));
  display:flex;flex-direction:column;overflow-y:auto;
}
.strip{position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent);z-index:25}
.eyebrow{color:var(--cyan);font-weight:700;font-size:11px;letter-spacing:.12em;margin-top:8px}
h1{font-size:30px;line-height:1.05;margin:4px 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:10px}
.panelbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.metric .k{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.metric .v{font-size:22px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.metric .v.small{font-size:16px}
.sec{color:var(--amber);font-weight:800;font-size:14px;margin:8px 0 4px;border-bottom:1px solid var(--border);padding-bottom:3px}
.row{display:flex;justify-content:space-between;font-size:14px;padding:2px 0;gap:10px}
.row .k{color:var(--muted)}
.row span:last-child{text-align:right}
.list{font-size:14px;line-height:1.45}
.list li{margin-left:16px}
.pill{display:inline-block;border-radius:999px;padding:3px 10px;font-size:12px;font-weight:700}
.pill.good{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
.pill.bad{background:color-mix(in srgb,var(--bad) 18%,transparent);color:var(--bad)}
.pill.warn{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
.pill.mut{background:color-mix(in srgb,var(--muted) 16%,transparent);color:var(--muted)}
.tag{font-size:11px;color:var(--muted)}
.cardbtn{display:block;text-align:center;border:1px solid var(--cyan);border-radius:10px;
  padding:12px;font-size:15px;font-weight:700;color:var(--ink);text-decoration:none;margin-top:8px}
.done{opacity:.55}
.dots{position:fixed;bottom:calc(6px + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:26}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--border);cursor:pointer;padding:0;border:4px solid transparent;background-clip:padding-box;box-sizing:content-box}
.dots i.on{background:var(--accent);background-clip:padding-box}
</style>

/* ---------- stations / splits helpers ---------- */
const stations=(D.aidStations||[]).slice().sort((a,b)=>a.distance-b.distance);
const splits=(D.splits||[]).slice().sort((a,b)=>a.startDistanceKm-b.startDistanceKm);
function targetSecAtKm(km){let t=0;for(const s of splits){

function effortColorAtKm(km){for(const s of splits){if(km>=s.startDistanceKm&&km<s.endDistanceKm)return EFFORT_COLORS[s.effort]||'#ff6a1a';}

const totalKm=stations.length?stations[stations.length-1].distance:(R.total/1000);
/* Loop course: first and last route coordinates within 50 m. The finish

const IS_LOOP=(()=>{if(R.lat.length<2)return false;
  const c0=Math.cos(R.lat[0]*Math.PI/180);
  const dx=(R.lng[R.lng.length-1]-R.lng[0])*111320*c0;
  const dy=(R.lat[R.lat.length-1]-R.lat[0])*110540;

/* ---------- time ---------- */
function startEpoch(){if(store.startedAt)return store.startedAt;
  const t=Date.parse(D.general&&D.general.startDate||'');return isNaN(t)?null:t;}
/* Race clock with pause support — elapsed time excludes paused intervals.
   Cutoffs stay wall-clock (startEpoch): pausing your watch never moves a cutoff. */
function raceElapsedSec(){
  if(!store.startedAt)return null;
  const end=store.finishedAt||store.pausedAt||Date.now();
  return Math.max(0,(end-store.startedAt-(store.pausedMs||0))/1000);
}
function clockState(){
  if(!store.startedAt)return 'idle';
  if(store.finishedAt)return 'done';
  return store.pausedAt?'paused':'running';
}
function cutoffEpoch(st){if(!st||!st.cutoffTime)return null;const m=/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec(st.cutoffTime.trim());
  const s0=startEpoch();if(!m||!s0)return null;return s0+(((+m[1])*3600+(+m[2])*60+(+(m[3]||0)))*1000);}
function fmtHMS(sec){sec=Math.max(0,Math.round(sec));const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return (h?h+':':'')+String(m).padStart(h?2:1,'0')+':'+String(s).padStart(2,'0');}
function fmtSigned(sec){const a=Math.abs(Math.round(sec)),h=Math.floor(a/3600),m=Math.floor(a%3600/60),s=a%60;
  return (sec<0?'-':'+')+(h?h+':'+String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0');}
function fmtClock(ep){const d=new Date(ep);return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtKm(km){return km>=10?km.toFixed(1):km.toFixed(2);}
function fmtPaceSec(secPerKm){if(!isFinite(secPerKm)||secPerKm<=0)return '--:--';
  let m=Math.floor(secPerKm/60),s=Math.round(secPerKm%60);

/* ---------- GPS + orthogonal (cross-track) projection ----------
   Continuity-aware: on out-and-back courses (Leadville style) the outbound
   and return tracks can run meters apart, so the globally-nearest segment
   may belong to the wrong direction. We prefer candidates inside a window
   around the last known along-track position; the window grows with time
   since the last fix (screen-off gaps) and the global result only wins when
   the windowed one is clearly wrong. */
let fix=null, along=null, offM=null, watchId=null, lastProj=null;
let startDistM=null;            // straight-line meters to the route's first coordinate
let wwMaxM=null, wrongWay=false; // wrong-way: sustained retreat from the furthest along
const CONT_BASE_M=2000, CONT_GROW_MPS=4, CONT_MAX_AGE_S=900;
/* Invert targetSecAtKm: km the PLAN expects after `sec` seconds of racing. */
function planKmAtSec(sec){
  let t=0;
  for(const s of splits){
    if(t+s.targetTimeSec>=sec)
      return s.startDistanceKm+Math.max(0,(sec-t)/Math.max(1,s.targetTimeSec))*(s.endDistanceKm-s.startDistanceKm);
    t+=s.targetTimeSec;
  }
  return totalKm;
}
/* With no continuity history (fresh open) the globally-nearest segment is
   ambiguous on loops/out-and-backs — at a start==finish course it can lock
   onto the LAST split before the race even starts. Seed the continuity
   window with the best prior we have: km 0 pre-race, else the km the plan
   expects for the elapsed race time. */
function seedProjection(){
  const now=Date.now();
  let km=0;
  if(store.startedAt){km=Math.min(totalKm,planKmAtSec(raceElapsedSec()||0));}
  else if(!store.rerun){
    // After a Reset (rerun) the planned start date is in the past — stay at
    // km 0 until the next Start tap instead of seeding mid-route.
    const t=Date.parse(D.general&&D.general.startDate||'');
    if(!isNaN(t)&&now>t)km=Math.min(totalKm,planKmAtSec((now-t)/1000));
  }
  return {alongM:kmToRouteM(km),t:now,seeded:true};
}
function project(lat,lng){
  if(R.lat.length<2)return null;
  const rad=Math.PI/180,latR=lat*rad,mx=111320*Math.cos(latR),my=110540;
  const now=Date.now();
  if(!lastProj&&store.proj&&(now-store.proj.t)<CONT_MAX_AGE_S*1000)lastProj=store.proj;
  if(!lastProj||(now-lastProj.t)/1000>=CONT_MAX_AGE_S)lastProj=seedProjection();
  let hasWin=true,winLo,winHi;
  if(lastProj.seeded){
    winLo=lastProj.alongM-3000;winHi=lastProj.alongM+3000;
  }else{
    const ageS=(now-lastProj.t)/1000;
    const grow=CONT_BASE_M+ageS*CONT_GROW_MPS;
    winLo=lastProj.alongM-grow*0.5;
    winHi=lastProj.alongM+grow;
  }
  let gD2=Infinity,gAlong=0,wD2=Infinity,wAlong=0;
  for(let i=0;i<R.lat.length-1;i++){
    const ax=(R.lng[i]-lng)*mx, ay=(R.lat[i]-lat)*my;
    const bx=(R.lng[i+1]-lng)*mx, by=(R.lat[i+1]-lat)*my;
    const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy;
    let t=L2>0?(-(ax*dx+ay*dy))/L2:0; t=t<0?0:(t>1?1:t);
    const px=ax+t*dx, py=ay+t*dy, d2=px*px+py*py;
    const alongM=R.cum[i]+t*(R.cum[i+1]-R.cum[i]);
    if(d2<gD2){gD2=d2;gAlong=alongM;}
    if(hasWin&&alongM>=winLo&&alongM<=winHi&&d2<wD2){wD2=d2;wAlong=alongM;}

}
/* ---------- audio cues + human VOICE guidance ----------
   Chime: vibrate where supported (Android; iOS Safari has no Vibration API)
   + short Web Audio beep. Voice: neural clips baked at build time (Piper),
   played through a single HTMLAudio element (bulletproof on iOS once
   unlocked by the Start tap). Web Speech is only a fallback when a clip is
   missing. A queue keeps announcements from talking over each other. */
let lastCueSplit=null, audioCtx=null;

const voiceEl=new Audio();
voiceEl.addEventListener('ended',()=>{voiceBusy=false;playNextVoice();});
voiceEl.addEventListener('error',()=>{voiceBusy=false;playNextVoice();});
function armAudio(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  }catch(e){}
  try{
    if(!armAudio._v){armAudio._v=1;voiceEl.muted=true;
      voiceEl.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
      voiceEl.play().then(()=>{voiceEl.pause();voiceEl.muted=false;})
        .catch(()=>{voiceEl.muted=false;});}
  }catch(e){}
}
function splitCue(){
  try{if(navigator.vibrate)navigator.vibrate(60);}catch(e){}
  try{
    if(!audioCtx)return;
    const t=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.28,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.09);
    o.connect(g).connect(audioCtx.destination);
    o.start(t);o.stop(t+0.1);
  }catch(e){}
}
function speakFallback(text){
  try{
    const u=new SpeechSynthesisUtterance(text);
    u.lang=(VOICE&&VOICE.lang)||'en-US';
    speechSynthesis.speak(u);
  }catch(e){}
}
function playNextVoice(){
  if(voiceBusy||!voiceQ.length)return;
  if(store.voiceMuted){voiceQ=[];return;}
  const it=voiceQ.shift();
  if(it.src){
    voiceBusy=true;voiceEl.src=it.src;
    voiceEl.play().catch(()=>{voiceBusy=false;speakFallback(it.text);playNextVoice();});
  }else{speakFallback(it.text);playNextVoice();}
}
/* chime first, then the clip (or Web Speech if the clip is missing) */
function say(key,text){
  if(store.voiceMuted)return;
  splitCue();
  const src=(VOICE&&VOICE.files&&VOICE.files[key])||null;
  setTimeout(()=>{voiceQ.push({src:src,text:text});playNextVoice();},350);
}
function trackSplitCue(){
  if(clockState()!=='running'){lastCueSplit=null;return;}
  const si=currentSplitIndex();
  if(si<0)return;
  if(lastCueSplit==null){lastCueSplit=si;return;}
  if(si>lastCueSplit){
    lastCueSplit=si;
    const sp=splits[si];
    const pace=sp?fmtPaceSec(sp.targetTimeSec/Math.max(.001,sp.distanceKm)):'';
    say('split-'+(si+1),(VOICE&&VOICE.lang==='es-MX')
      ?('Empieza el split '+(si+1)+'. Debes ir a '+pace+' por kilómetro.')
      :('Split '+(si+1)+'. Target '+pace+' per kilometer.'));

/* aid-station voice: one approach call at 400 m out, one on arrival.
   Re-arms when the station becomes the "next" target again (out-and-backs
   pass the same station twice and must announce twice). */
let spokenApproach=new Set(), lastAtASid=null, lastNextAS=null;
function trackVoiceAS(){
  const st=raceState();
  if(st.kind==='at_as'){
    const id=st.station.id;
    if(id!==lastAtASid){
      lastAtASid=id;
      if(st.station.type!=='start')
        say('as-arrive-'+id,((VOICE&&VOICE.lang==='es-MX')?'Llegaste a ':"You're at ")+st.station.name);
    }
    return;
  }
  if(st.kind!=='in_leg'){lastNextAS=null;return;}
  lastAtASid=null;
  const to=st.to, dM=(to.distance-st.along)*1000;
  if(!lastNextAS||lastNextAS.id!==to.id){
    spokenApproach.delete(to.id);
    lastNextAS={id:to.id,d:dM};
    return;
  }
  if(lastNextAS.d>400&&dM<=400&&!spokenApproach.has(to.id)&&to.type!=='start'){
    spokenApproach.add(to.id);
    say('as-approach-'+to.id,((VOICE&&VOICE.lang==='es-MX')?'En unos 400 metros, ':'In about 400 meters, ')+to.name);
  }

function trackWrongWay(aM){

  if(wwMaxM==null||aM>wwMaxM)wwMaxM=aM;

  // >30 m behind the furthest point reached, while actually moving: the DTD
  // keeps growing on an out-and-back return, so only a real turnaround trips.

function onFix(pos){

      (R.lng[0]-pos.coords.longitude)*111320*c0,
      (R.lat[0]-pos.coords.latitude)*110540);
  }
  const cs=clockState();
  // Leaving review mode (Start tapped or reached the start area): drop the
  // review pin so the map follows the runner again.
  if(panUntil===Number.MAX_SAFE_INTEGER&&!reviewMode()){panCenter=null;panUntil=0;}
  if(cs==='running'||cs==='paused'){
    const p=project(pos.coords.latitude,pos.coords.longitude);
    if(p){offM=p.offM; along=p.alongM/Math.max(1,R.total)*totalKm;
      trackWrongWay(p.alongM); trackSplitCue(); trackVoiceAS();}
    trackPaceMarks();

    // Pre-Start: pure tracking + guidance to km 0 — NOTHING is measured
    // until the Start tap (no along/consumed/pace/off-route/wrong-way).

/* ---------- race state ---------- */
function raceState(){
  if(along==null)return{kind:'nofix'};
  if(offM!=null&&offM>OFF_ROUTE_M)return{kind:'offroute',along,offM};
  for(let i=0;i<stations.length;i++){
    if(Math.abs(along-stations[i].distance)*1000<=AS_RADIUS_M){
      return{kind:'at_as',station:stations[i],index:i,along};
    }
  }
  let next=stations.findIndex(s=>s.distance>along);
  if(next<0)next=stations.length-1;
  return{kind:'in_leg',from:stations[Math.max(0,next-1)],to:stations[next],index:next,along};
}
/* Actual pace marks: where/when we entered the current leg and the current
   split, so LEG PACE and SPLIT PACE measure real progress inside each. */
function currentSplitIndex(){
  if(along==null)return -1;
  for(let i=0;i<splits.length;i++){
    if(along>=splits[i].startDistanceKm&&(along<splits[i].endDistanceKm||i===splits.length-1))return i;
  }
  return -1;
}
let prevFixMark=null;
function trackPaceMarks(){
  const st=raceState(), now=Date.now();

    // re-established at the first fix after Resume.
    store.legMark=null;store.splitMark=null;
    if(lastProj&&!lastProj.seeded)store.proj={alongM:lastProj.alongM,t:lastProj.t};
    if(along!=null)prevFixMark={alongKm:along,t:now};
    save();return;
  }
  if(st.kind==='in_leg'){
    const mark=store.legMark;
    if(!mark||mark.index!==st.index||along<mark.alongKm-0.2){
      store.legMark={index:st.index,alongKm:along,t:now};
    }
  }else if(st.kind==='at_as'){store.legMark=null;}
  const si=currentSplitIndex();
  if(si>=0){
    const sm=store.splitMark;
    if(!sm||sm.index!==si||along<sm.alongKm-0.2){
      // Advancing from the previous split in one fix step: interpolate the
      // exact boundary-crossing time so SPLIT PACE starts at the boundary.
      let alongKm=along,t=now;

        t=prevFixMark.t+(now-prevFixMark.t)*(b-prevFixMark.alongKm)/Math.max(.001,along-prevFixMark.alongKm);
        alongKm=b;

      store.splitMark={index:si,alongKm,t};
    }

}
function paceFromMark(mark,minKm){
  if(!mark||along==null)return null;
  const dKm=along-mark.alongKm;

function currentLegPaceSec(){return paceFromMark(store.legMark,0.12);}
function currentSplitPaceSec(){return paceFromMark(store.splitMark,0.08);}
function routePaceSec(){
  const elapsed=raceElapsedSec();
  if(elapsed==null||along==null||along<0.15)return null;
  return elapsed>10?elapsed/along:null;
}

/* ---------- cards ---------- */
const deck=document.getElementById('deck'), dots=document.getElementById('dots');
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function fuelHtml(st){

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  return a&&b?(a.name+' → '+b.name):'';
}
/* Station card: pure point logistics — what happens AT this stop. */
function stationCard(st,i){
  const crew=(D.crew||[]).filter(m=>(st.crewAssigned||[]).includes(m.id));
  const pin=(D.crew||[]).filter(m=>m.isPacer&&m.pacerInStationId===st.id).map(m=>m.name);
  const pout=(D.crew||[]).filter(m=>m.isPacer&&m.pacerOutStationId===st.id).map(m=>m.name);
  const kind=st.type==='start'?'START':st.type==='finish'?'FINISH':'AID STATION';
  return el('<section class="card" data-km="'+st.distance+'">'+
    '<div class="eyebrow">'+esc(D.general&&D.general.raceName||'RACE')+' · '+kind+'</div>'+
    '<h1>'+esc(st.name)+'</h1>'+
    '<div class="sub">'+(st.elevation?Math.round(st.elevation)+' m':'')+'</div>'+
    '<div class="metrics">'+
      '<div class="metric"><div class="k">Cutoff</div><div class="v small">'+(st.cutoffTime?esc(st.cutoffTime):'—')+'</div>'+
        '<div class="tag cutleft" data-si="'+i+'"></div></div>'+
      '<div class="metric"><div class="k">Planned break</div><div class="v small">'+(st.breakTimeMinutes?st.breakTimeMinutes+' min':'—')+'</div>'+
        '<div class="tag breakleft" data-si="'+i+'"></div></div>'+
    '</div>'+
    '<div class="panelbox">'+
      '<div class="row"><span class="k">Crew here</span><span>'+(st.crewAllowed?(crew.length?'':'allowed'):'no')+'</span></div>'+
      crew.map(m=>'<div class="row"><span class="k">·</span><span>'+crewLine(m)+'</span></div>').join('')+
      (pin.length?'<div class="row"><span class="k">Pacer IN — joins you</span><span>'+esc(pin.join(', '))+'</span></div>':'')+
      (pout.length?'<div class="row"><span class="k">Pacer OUT — leaves</span><span>'+esc(pout.join(', '))+'</span></div>':'')+
      '<div class="row"><span class="k">Drop bag</span><span>'+((st.dropBags&&st.dropBags.length)?'YES — ask for it':'no')+'</span></div>'+
    '</div>'+
    (st.instructions?'<div class="sec">Do here</div><div class="list">'+esc(st.instructions)+'</div>':'')+
    (st.notes?'<div class="sec">Notes</div><div class="list">'+esc(st.notes)+'</div>':'')+
    // Directions to the start line (km 0). Hidden by renderCards() once the
    // runner is within the AS radius of the start or the race has started.
    (st.type==='start'&&R.lat.length?
      '<div class="sec dirbtns">Getting there</div>'+
      '<a class="cardbtn dirbtns" target="_blank" rel="noopener" href="https://www.google.com/maps/dir/?api=1&destination='+
        R.lat[0]+','+R.lng[0]+'&travelmode=walking">🗺 Google Directions</a>'+
      '<a class="cardbtn dirbtns" target="_blank" rel="noopener" href="https://maps.apple.com/?daddr='+
        R.lat[0]+','+R.lng[0]+'&dirflg=w">🍎 Apple Maps</a>'
    :'')+
  '</section>');
}
/* Leg card: what to consume on the way + who runs with you. */
function legCard(i){
  const a=stations[i], b=stations[i+1];
  const pac=pacersForLeg(i);
  return el('<section class="card" data-km="'+b.distance+'">'+
    '<div class="eyebrow">'+esc(D.general&&D.general.raceName||'RACE')+' · LEG '+(i+1)+'</div>'+
    '<h1>'+esc(legName(i))+'</h1>'+
    '<div class="sub">'+(legHasCustomName(i)?esc(a.name)+' → '+esc(b.name)+' · ':'')+
      (pac.length?'With pacer: '+esc(pac.join(', ')):'Solo — no pacer on this leg')+'</div>'+
    (fuelHtml(a)||'<div class="panelbox tag">No fuel plan stored for this leg.</div>')+
  '</section>');
}
/* Interleaved deck: Start · Leg 1 · AS1 · Leg 2 · … · Finish (2S−1 cards). */
stations.forEach((s,i)=>{
  deck.appendChild(stationCard(s,i));
  if(i<stations.length-1)deck.appendChild(legCard(i));
});
const cardCount=deck.children.length;
dots.innerHTML=Array.from({length:cardCount},(_, i)=>'<i'+(i===0?' class="on"':'')+'></i>').join('');
/* Card holding the runner's current state: station s -> 2s, leg to station n -> 2n-1. */
function activeCardIdx(){
  const st=raceState();
  if(st.kind==='at_as')return 2*st.index;
  if(st.kind==='in_leg')return Math.max(0,2*st.index-1);
  if(along!=null){
    let n=stations.findIndex(s=>s.distance>along);
    if(n<0)return cardCount-1;
    return Math.max(0,2*n-1);
  }
  return 0;
}

function cardIndex(){return Math.max(0,Math.min(cardCount-1,Math.round(deck.scrollLeft/Math.max(1,deck.clientWidth))));}
function goTo(i){i=Math.max(0,Math.min(cardCount-1,i));deck.scrollTo({left:i*deck.clientWidth,behavior:'smooth'});}
function syncNav(){
  const i=cardIndex();
  [...dots.children].forEach((d,j)=>d.classList.toggle('on',j===i));
}
deck.addEventListener('scroll',syncNav,{passive:true});
[...dots.children].forEach((d,i)=>{d.onclick=()=>goTo(i);});
document.addEventListener('keydown',e=>{
  if(!document.body.classList.contains('cards'))return;
  if(e.key==='ArrowRight')goTo(cardIndex()+1);
  else if(e.key==='ArrowLeft')goTo(cardIndex()-1);
});
// Desktop: drag/pan the deck with the mouse (touch keeps native swipe).
let drag=null;
deck.addEventListener('pointerdown',e=>{
  if(e.pointerType!=='mouse'||e.button!==0)return;
  drag={x:e.clientX,left:deck.scrollLeft,moved:false};
  deck.classList.add('dragging');
});
deck.addEventListener('pointermove',e=>{
  if(!drag)return;
  const dx=e.clientX-drag.x;
  if(Math.abs(dx)>4)drag.moved=true;
  if(drag.moved)deck.scrollLeft=drag.left-dx;
});
function endDrag(){
  if(!drag)return;
  const moved=drag.moved;drag=null;
  deck.classList.remove('dragging');
  if(moved)goTo(cardIndex());
}
deck.addEventListener('pointerup',endDrag);
deck.addEventListener('pointercancel',endDrag);
deck.addEventListener('pointerleave',endDrag);

/* ---------- cards live refresh: cutoff countdowns + passed-graying ---------- */
function renderCards(){
  const now=Date.now();
  document.querySelectorAll('.cutleft').forEach(elm=>{
    const st=stations[+elm.dataset.si];
    const co=st?cutoffEpoch(st):null;
    if(!co){elm.textContent='';return;}
    const left=(co-now)/1000;
    elm.textContent=left>0?('closes in '+fmtHMS(left)):'CLOSED';
    elm.style.color=left<1800?'var(--bad)':'var(--muted)';
  });
  document.querySelectorAll('.breakleft').forEach(elm=>{
    const st=stations[+elm.dataset.si];
    if(!st||!store.asArrival||store.asArrival.id!==st.id){elm.textContent='';return;}
    const left=(st.breakTimeMinutes||0)*60-(now-store.asArrival.t)/1000;
    elm.textContent=left>=0?('break left '+fmtHMS(left)):('overtime +'+fmtHMS(-left)+' — GO');
    elm.style.color=left<60?'var(--bad)':'var(--amber)';
  });
  // Directions to the start: gone once you arrive (<=75 m) or the race started.
  const arrived=(startDistM!=null&&startDistM<=75)||clockState()!=='idle';
  document.querySelectorAll('.dirbtns').forEach(elm=>{elm.style.display=arrived?'none':'';});
  if(along!=null){
    [...deck.children].forEach(c=>{
      const km=parseFloat(c.dataset&&c.dataset.km);
      if(!isNaN(km))c.classList.toggle('done',km<along-0.05);
    });
  }
}

/* ---------- MAP VIEW (default) ---------- */
const mapCv=document.getElementById('map'), mapCtx=mapCv.getContext('2d');
const profCv=document.getElementById('prof'), profCtx=profCv.getContext('2d');
const panelEl=document.getElementById('panel');
const DPR=Math.min(2.5,window.devicePixelRatio||1);
let mapOn=true, navNeedsDraw=true, rafId=null;
const TILESET=new Set(TILE_KEYS);
const TILE_Z=[...new Set(TILE_KEYS.map(k=>+k.split('/')[0]))].sort((a,b)=>a-b);
const TZ_MIN=TILE_Z.length?TILE_Z[0]:12, TZ_MAX=TILE_Z.length?TILE_Z[TILE_Z.length-1]:15;
let mapZoom=Math.min(TZ_MAX,14.6);
let headingDeg=null;
/* Two nav orientations, toggled by the top-right button:
   'heading' (default) — the map/route rotate so the runner's nose points up;
   'north'             — map fixed north-up, the marker arrow rotates. */
let navMode=store.navMode==='north'?'north':'heading';
let rotation=0, rotTarget=0;
let panCenter=null, panUntil=0;
const tileImgs=new Map();

function tileURL(z,x,y){return 'tiles/'+z+'/'+x+'/'+y;}
function getTile(z,x,y){
  const key=z+'/'+x+'/'+y;
  if(!TILESET.has(key))return null;
  let img=tileImgs.get(key);
  if(!img){
    img=new Image();
    img.onload=()=>{navNeedsDraw=true;};
    img.src=tileURL(z,x,y);
    tileImgs.set(key,img);
  }
  return img.complete&&img.naturalWidth>0?img:null;
}
function mercWorld(lng,lat,z){
  const n=256*Math.pow(2,z);
  const x=(lng+180)/360*n;
  const latR=Math.max(-85.0511,Math.min(85.0511,lat))*Math.PI/180;
  const y=(1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n;
  return {x,y};
}
function mapCenter(){
  const now=Date.now();
  if(panCenter&&(now<panUntil||reviewMode()))return panCenter;
  panCenter=null;
  // The marker is ALWAYS the real GPS fix — never snapped onto the route.
  // Off the course you see yourself AND the gap to the track, as it is.
  if(fix)return {lat:fix.coords.latitude,lng:fix.coords.longitude};
  return R.lat.length?{lat:R.lat[0],lng:R.lng[0]}:{lat:0,lng:0};
}
/* ---------- home review mode: free pan/zoom + route framing ----------
   Idle and far from the start (or no fix yet): the runner is INSPECTING the
   strategy, not racing. Pan/zoom stick (no snap-back), the map opens framed
   on the whole route, and north stays up. Running or near the start switches
   back to follow mode and clears the review pin. */
function reviewMode(){
  return clockState()==='idle'&&(startDistM==null||startDistM>500);
}
function frameRoute(){
  if(R.lat.length<2)return;
  let minLat=90,maxLat=-90,minLng=180,maxLng=-180;
  for(let i=0;i<R.lat.length;i++){
    if(R.lat[i]<minLat)minLat=R.lat[i];if(R.lat[i]>maxLat)maxLat=R.lat[i];
    if(R.lng[i]<minLng)minLng=R.lng[i];if(R.lng[i]>maxLng)maxLng=R.lng[i];
  }
  resizeCanvases();
  const p1=mercWorld(minLng,maxLat,TZ_MIN), p2=mercWorld(maxLng,minLat,TZ_MIN);
  const bw=Math.max(1e-6,p2.x-p1.x), bh=Math.max(1e-6,p2.y-p1.y);
  const panelPx=(panelEl.offsetHeight||0)*DPR;
  const availW=mapCv.width*0.86, availH=Math.max(80,(mapCv.height-panelPx)*0.8);
  const s=Math.min(availW/bw,availH/bh);
  mapZoom=Math.max(TZ_MIN,Math.min(TZ_MAX+2.5,TZ_MIN+Math.log2(Math.max(1e-9,s/DPR))));
  // Place the route's center at the middle of the VISIBLE area (the draw
  // anchor sits low, just above the panel — compensate the offset).
  const scale=Math.pow(2,mapZoom-TZ_MIN)*DPR;
  const cyPx=Math.max(90*DPR,(mapCv.height-panelPx)-100*DPR);
  const midPx=(mapCv.height-panelPx)/2;
  const cxW=(p1.x+p2.x)/2, cyW=(p1.y+p2.y)/2+(cyPx-midPx)/scale;
  const n=256*Math.pow(2,TZ_MIN);
  panCenter={lat:Math.atan(Math.sinh(Math.PI*(1-2*cyW/n)))*180/Math.PI,
             lng:cxW/n*360-180};
  panUntil=Number.MAX_SAFE_INTEGER;
  navNeedsDraw=true;
}
function resizeCanvases(){
  const mw=mapCv.clientWidth,mh=mapCv.clientHeight;
  if(mapCv.width!==Math.round(mw*DPR)){mapCv.width=Math.round(mw*DPR);mapCv.height=Math.round(mh*DPR);}
  const pw=profCv.clientWidth,ph=profCv.clientHeight;
  if(profCv.width!==Math.round(pw*DPR)){profCv.width=Math.round(pw*DPR);profCv.height=Math.round(ph*DPR);}
}
function drawMap(){
  resizeCanvases();
  const w=mapCv.width,h=mapCv.height;
  const day=document.documentElement.classList.contains('day');
  mapCtx.setTransform(1,0,0,1,0,0);
  mapCtx.imageSmoothingQuality='high'; // ground-level zoom upscales z15 tiles
  mapCtx.fillStyle=day?'#e7ebe4':'#0a1216';
  mapCtx.fillRect(0,0,w,h);

  const tz=Math.max(TZ_MIN,Math.min(TZ_MAX,Math.round(mapZoom)));
  const scale=Math.pow(2,mapZoom-tz)*DPR;
  const c=mapCenter();
  const wc=mercWorld(c.lng,c.lat,tz);
  // Marker rides low — just above the leg pill — so the map ahead gets
  // most of the visible area (panel excluded).
  const panelPx=(panelEl.offsetHeight||0)*DPR;
  const cx=w/2, cy=Math.max(90*DPR,(h-panelPx)-100*DPR);
  // Heading-up: rotate the world so the runner faces up. North mode unwinds
  // smoothly back to 0. Review mode forces north-up (stable inspection).
  const want=(navMode==='heading'&&!reviewMode())?rotTarget:0;
  let dR=((want-rotation+540)%360)-180;
  rotation=(rotation+dR*0.18+360)%360;
  const rot=-rotation*Math.PI/180;

  mapCtx.save();
  mapCtx.translate(cx,cy);
  mapCtx.rotate(rot);
  mapCtx.scale(scale,scale);
  mapCtx.translate(-wc.x,-wc.y);

  const halfWorld=(Math.hypot(w,h)/2)/scale+256;
  const x0=Math.floor((wc.x-halfWorld)/256), x1=Math.floor((wc.x+halfWorld)/256);
  const y0=Math.floor((wc.y-halfWorld)/256), y1=Math.floor((wc.y+halfWorld)/256);
  for(let ty=y0;ty<=y1;ty++)for(let tx=x0;tx<=x1;tx++){
    const img=getTile(tz,tx,ty);
    if(img)mapCtx.drawImage(img,tx*256,ty*256,256.4,256.4);
  }
  if(!day){ // dim the topo at night for contrast
    mapCtx.fillStyle='rgba(4,10,14,0.42)';
    mapCtx.fillRect(wc.x-halfWorld,wc.y-halfWorld,halfWorld*2,halfWorld*2);
  }

  // route: consumed part in the profile's blue, remaining by split effort
  if(R.lat.length>1){
    const lw=4.5*DPR/scale;
    mapCtx.lineCap='round';mapCtx.lineJoin='round';
    mapCtx.lineWidth=lw+2.2*DPR/scale;
    mapCtx.strokeStyle='rgba(0,0,0,0.55)';
    mapCtx.beginPath();
    for(let i=0;i<R.lat.length;i++){const p=mercWorld(R.lng[i],R.lat[i],tz);i?mapCtx.lineTo(p.x,p.y):mapCtx.moveTo(p.x,p.y);}
    mapCtx.stroke();
    mapCtx.lineWidth=lw;
    let segColor=null;
    mapCtx.beginPath();
    for(let i=0;i<R.lat.length;i++){
      const km=R.cum[i]/Math.max(1,R.total)*totalKm;
      const color=(along!=null&&km<along)?CONSUMED:effortColorAtKm(km);
      const p=mercWorld(R.lng[i],R.lat[i],tz);
      if(color!==segColor){
        if(segColor){mapCtx.stroke();mapCtx.beginPath();mapCtx.moveTo(p.x,p.y);}
        else mapCtx.moveTo(p.x,p.y);
        mapCtx.strokeStyle=color;segColor=color;
      }else mapCtx.lineTo(p.x,p.y);
    }
    mapCtx.stroke();
  }
  mapCtx.restore();

  // stations + user marker in screen space
  const toScreen=(lat,lng)=>{
    const p=mercWorld(lng,lat,tz);
    const dx=(p.x-wc.x)*scale, dy=(p.y-wc.y)*scale;
    const cosR=Math.cos(rot),sinR=Math.sin(rot);
    return {x:cx+dx*cosR-dy*sinR, y:cy+dx*sinR+dy*cosR};
  };
  const fpx=13*DPR;
  mapCtx.font='700 '+(11*DPR)+'px system-ui';
  // split number in a rounded rectangle (Waze shield style) at the MIDDLE of
  // each split; interior boundaries get a small white dot with black border
  // so same-color neighbours stay distinguishable.
  for(let i=0;i<splits.length;i++){
    const km=(splits[i].startDistanceKm+splits[i].endDistanceKm)/2;
    const p=latLngAtKm(km);if(!p)continue;
    const s=toScreen(p.lat,p.lng);
    if(s.x<-30||s.y<-30||s.x>w+30||s.y>h+30)continue;
    const txt=String(i+1);
    const tw=mapCtx.measureText(txt).width;
    const bw=tw+10*DPR, bh=17*DPR, r=5*DPR;
    mapCtx.beginPath();
    if(mapCtx.roundRect)mapCtx.roundRect(s.x-bw/2,s.y-bh/2,bw,bh,r);
    else mapCtx.rect(s.x-bw/2,s.y-bh/2,bw,bh);
    mapCtx.fillStyle='#fff';mapCtx.fill();
    mapCtx.lineWidth=1.8*DPR;mapCtx.strokeStyle='#111';mapCtx.stroke();
    mapCtx.fillStyle='#111';
    mapCtx.fillText(txt,s.x-tw/2,s.y+4*DPR);
  }
  for(let i=1;i<splits.length;i++){
    const km=splits[i].startDistanceKm;
    if(stations.some(st=>Math.abs(st.distance-km)<0.03))continue;
    const p=latLngAtKm(km);if(!p)continue;
    const s=toScreen(p.lat,p.lng);
    if(s.x<-20||s.y<-20||s.x>w+20||s.y>h+20)continue;
    mapCtx.beginPath();mapCtx.arc(s.x,s.y,3.5*DPR,0,7);
    mapCtx.fillStyle='#fff';mapCtx.fill();
    mapCtx.lineWidth=1.6*DPR;mapCtx.strokeStyle='#000';mapCtx.stroke();
  }
  for(const st of stations){
    // Loop course: start and finish markers overlap — show only Start until
    // the race clock is running.
    if(IS_LOOP&&st.type==='finish'&&clockState()==='idle')continue;
    const p=latLngAtKm(st.distance);if(!p)continue;
    const s=toScreen(p.lat,p.lng);
    if(s.x<-40||s.y<-40||s.x>w+40||s.y>h+40)continue;
    const color=st.type==='start'?'#22c55e':st.type==='finish'?'#ef4444':'#ff6a1a';
    mapCtx.beginPath();mapCtx.arc(s.x,s.y,6.5*DPR,0,7);
    mapCtx.fillStyle=color;mapCtx.fill();
    mapCtx.lineWidth=2*DPR;mapCtx.strokeStyle='#0b0f10';mapCtx.stroke();
    if(mapZoom>=13){
      mapCtx.fillStyle=day?'#101413':'#f2f7f8';
      mapCtx.strokeStyle=day?'rgba(255,255,255,.75)':'rgba(0,0,0,.75)';
      mapCtx.lineWidth=3*DPR;
      mapCtx.strokeText(st.name,s.x+9*DPR,s.y+4*DPR);
      mapCtx.fillText(st.name,s.x+9*DPR,s.y+4*DPR);
    }
  }
  // user marker: nose-up in heading mode (the map rotates instead); in north
  // mode the arrow itself rotates with the runner's heading.
  const hdg=navMode==='heading'?rotation:
    (headingDeg!=null?headingDeg:
      (fix&&fix.coords.heading!=null&&fix.coords.speed>0.7?fix.coords.heading:0));
  mapCtx.save();
  mapCtx.translate(cx,cy);
  mapCtx.rotate((navMode==='heading'?0:hdg)*Math.PI/180);
  mapCtx.beginPath();
  mapCtx.moveTo(0,-fpx);mapCtx.lineTo(fpx*0.75,fpx*0.9);mapCtx.lineTo(0,fpx*0.45);mapCtx.lineTo(-fpx*0.75,fpx*0.9);
  mapCtx.closePath();
  mapCtx.fillStyle=wrongWay?'#c62828':
    clockState()==='idle'?'#ffb31f':
    (fix&&(offM==null||offM<=OFF_ROUTE_M))?'#0057d9':'#8a949c';
  mapCtx.fill();
  mapCtx.lineWidth=2.5*DPR;mapCtx.strokeStyle='#fff';mapCtx.stroke();
  mapCtx.restore();
}
function drawProfile(){
  const w=profCv.width,h=profCv.height;
  const day=document.documentElement.classList.contains('day');
  profCtx.setTransform(1,0,0,1,0,0);
  profCtx.fillStyle=day?'#ffffff':'#0c161c';
  profCtx.fillRect(0,0,w,h);
  if(R.elev.length<2)return;
  const L=8*DPR,Rm=8*DPR,T=8*DPR,B=14*DPR;
  let minE=Infinity,maxE=-Infinity;
  for(const e of R.elev){if(e<minE)minE=e;if(e>maxE)maxE=e;}
  const span=Math.max(10,maxE-minE);
  const X=m=>L+(m/Math.max(1,R.total))*(w-L-Rm);
  const Y=e=>T+(1-(e-minE)/span)*(h-T-B);
  const alongM=along!=null?kmToRouteM(along):null;

  // remaining terrain in effort colors ("mountain slices"), consumed in blue
  const N=Math.max(120,Math.min(700,Math.floor(w/(2*DPR))));
  function areaPath(fromM,toM){
    profCtx.beginPath();
    profCtx.moveTo(X(fromM),Y(elevAtM(fromM)));
    const steps=Math.max(2,Math.round(N*(toM-fromM)/R.total));
    for(let i=1;i<=steps;i++){const m=fromM+(toM-fromM)*i/steps;profCtx.lineTo(X(m),Y(elevAtM(m)));}
    profCtx.lineTo(X(toM),h-B);profCtx.lineTo(X(fromM),h-B);profCtx.closePath();
  }
  for(const s of splits){
    const m0=kmToRouteM(s.startDistanceKm), m1=kmToRouteM(s.endDistanceKm);
    areaPath(m0,m1);
    profCtx.fillStyle=EFFORT_COLORS[s.effort]||'#ff6a1a';
    profCtx.globalAlpha=day?0.85:0.9;
    profCtx.fill();
  }
  profCtx.globalAlpha=1;
  if(alongM!=null&&alongM>1){
    areaPath(0,Math.min(alongM,R.total));
    profCtx.fillStyle=CONSUMED;
    profCtx.fill();
  }
  // outline
  profCtx.beginPath();
  for(let i=0;i<=N;i++){const m=R.total*i/N;const x=X(m),y=Y(elevAtM(m));i?profCtx.lineTo(x,y):profCtx.moveTo(x,y);}
  profCtx.lineWidth=1.5*DPR;profCtx.strokeStyle=day?'rgba(0,0,0,.5)':'rgba(255,255,255,.6)';profCtx.stroke();
  // AS ticks
  for(const st of stations){
    const m=kmToRouteM(st.distance),x=X(m);
    profCtx.beginPath();profCtx.moveTo(x,T);profCtx.lineTo(x,h-B);
    profCtx.lineWidth=1*DPR;profCtx.strokeStyle=day?'rgba(0,0,0,.28)':'rgba(255,255,255,.3)';
    profCtx.setLineDash([3*DPR,3*DPR]);profCtx.stroke();profCtx.setLineDash([]);
  }
  // runner cursor: full-height vertical line + dot (Strava-style)
  if(alongM!=null){
    const x=X(Math.min(alongM,R.total)),y=Y(elevAtM(Math.min(alongM,R.total)));
    profCtx.beginPath();profCtx.moveTo(x,T);profCtx.lineTo(x,h-B);
    profCtx.lineWidth=1.5*DPR;
    profCtx.strokeStyle=day?'rgba(0,0,0,.65)':'rgba(255,255,255,.8)';
    profCtx.stroke();
    profCtx.beginPath();profCtx.arc(x,y,5.5*DPR,0,7);
    profCtx.fillStyle='#fff';profCtx.fill();
    profCtx.lineWidth=3*DPR;profCtx.strokeStyle='#ff6a1a';profCtx.stroke();
  }
  // cumulative climb/descent at the runner's position (route totals pre-GPS)
  const gl=gainLossAtM(alongM!=null?alongM:R.total);
  const label=(alongM!=null?'':'route  ')+'D+ '+Math.round(gl.gain)+' m   D- '+Math.round(gl.loss)+' m';
  profCtx.font='700 '+(11*DPR)+'px system-ui';
  const tw=profCtx.measureText(label).width;
  profCtx.fillStyle=day?'rgba(255,255,255,.82)':'rgba(7,16,21,.72)';
  profCtx.fillRect(w-Rm-tw-12*DPR,T,tw+10*DPR,17*DPR);
  profCtx.fillStyle=day?'#101413':'#f2f7f8';
  profCtx.fillText(label,w-Rm-tw-7*DPR,T+12.5*DPR);
}
/* ---------- pace band: tap cycles SPLIT → LEG → ROUTE → SPLIT … ---------- */
const PACE_SCOPES=['split','leg','route'];
let paceScope=PACE_SCOPES.includes(store.paceScope)?store.paceScope:'split';
function cyclePaceScope(){
  paceScope=PACE_SCOPES[(PACE_SCOPES.indexOf(paceScope)+1)%PACE_SCOPES.length];
  store.paceScope=paceScope;save();
  updatePaceband();
}
document.getElementById('paceband').onclick=cyclePaceScope;
function fmtRem(km){return km>=10?km.toFixed(1):km.toFixed(2);}
function preRaceNow(){
  if(clockState()!=='idle')return false;
  if(store.rerun)return true; // after Reset: pre-race again, whatever the date
  const t=Date.parse(D.general&&D.general.startDate||'');
  return isNaN(t)||Date.now()<t;
}
function updatePaceband(){
  const st=raceState();
  // Pre-race: pin to split 1 / leg 1 — a phone sitting near the finish of a
  // loop must not show the last split's numbers.
  const preRace=preRaceNow();
  let name='',tgt=null,cur=null,rem=null;
  if(paceScope==='route'){
    name='ROUTE';
    tgt=totalKm>0?targetSecAtKm(totalKm)/totalKm:null;
    cur=routePaceSec();
    rem=(along!=null&&!preRace)?Math.max(0,totalKm-along):totalKm;
  }else if(paceScope==='leg'){
    let li=-1;
    if(!preRace&&st.kind==='in_leg')li=st.index-1;
    else if(!preRace&&st.kind==='at_as')li=Math.min(st.index,stations.length-2);
    else if(stations.length>1)li=0;
    const a=li>=0?stations[li]:null, b=li>=0?stations[li+1]:null;
    if(a&&b&&b.distance>a.distance){
      name='LEG · '+legName(li).toUpperCase();
      tgt=(targetSecAtKm(b.distance)-targetSecAtKm(a.distance))/Math.max(.001,b.distance-a.distance);
      rem=(along!=null&&!preRace)?Math.max(0,b.distance-along):(b.distance-a.distance);
    }else name='LEG';
    cur=currentLegPaceSec();
  }else{
    const si=preRace?(splits.length?0:-1):currentSplitIndex();
    const sp=si>=0?splits[si]:null;
    name=sp?('SPLIT '+(si+1)+' / '+splits.length):'SPLIT';
    if(sp){
      tgt=sp.targetTimeSec/Math.max(.001,sp.distanceKm);
      rem=(along!=null&&!preRace)?Math.max(0,sp.endDistanceKm-along):sp.distanceKm;
    }
    cur=currentSplitPaceSec();
  }
  document.getElementById('scopename').textContent=name;
  document.getElementById('pv-tgt').textContent=tgt?fmtPaceSec(tgt):'--:--';
  document.getElementById('pv-cur').textContent=cur?fmtPaceSec(cur):'--:--';
  document.getElementById('pv-rem').textContent=rem!=null?fmtRem(rem):'--';
  const e=raceElapsedSec();
  document.getElementById('raceclock').textContent=e!=null?fmtHMS(e):'--:--';
}

/* ---------- leg pill + overlay positioning above the bottom panel ---------- */
function positionOverlays(){
  const ph=panelEl.offsetHeight||0;
  document.getElementById('legpill').style.bottom=(ph+10)+'px';
  document.getElementById('tile-status').style.bottom=(ph+12)+'px';
}
/* The panel height settles late on iOS (fonts, safe-area, label wrapping):
   track it instead of trusting the boot-time measurement. */
if(window.ResizeObserver)new ResizeObserver(positionOverlays).observe(panelEl);
window.addEventListener('load',positionOverlays);
setTimeout(positionOverlays,300);setTimeout(positionOverlays,1200);
function updateLegpill(){
  const st=raceState(), lp=document.getElementById('legpill');
  let txt='', dist='', color='#1d3f8f';
  if(wrongWay){txt='↩ WRONG WAY';color='#c62828';}
  else if(clockState()==='idle'&&startDistM!=null&&startDistM<=500&&startDistM>30){
    // Walking to the start line among city streets: guiding to km 0 beats
    // the off-route warning — pre-race you are off-route by definition.
    txt='→ START · '+Math.round(startDistM)+' m';
  }
  else if(st.kind==='offroute'){txt='OFF ROUTE · '+Math.round(st.offM)+' m';color='#c62828';}
  else if(st.kind==='at_as')txt='AT '+st.station.name;
  else if(st.kind==='in_leg'){
    txt=legName(st.index-1);
    // remaining distance of the leg rides OUTSIDE the ellipsis span so it is
    // always visible even when the leg name gets truncated
    dist='· '+Math.max(0,st.to.distance-st.along).toFixed(1)+' km';
  }
  else if(stations.length>1)txt=legName(0);
  else txt=(D.general&&D.general.raceName)||'—';
  lp.innerHTML='';
  const nm=document.createElement('span');nm.className='nm';nm.textContent=txt;lp.appendChild(nm);
  if(dist){const ds=document.createElement('span');ds.className='dist';ds.textContent=dist;lp.appendChild(ds);}
  lp.style.color=color;
}

/* ---------- AS break countdown (visible in map AND cards mode) ---------- */
function updateBreakChip(){
  const el=document.getElementById('breakchip');
  const st=raceState(), cs=clockState();
  if((cs==='running'||cs==='paused')
     &&st.kind==='at_as'&&st.station.type!=='start'&&st.station.type!=='finish'
     &&(st.station.breakTimeMinutes||0)>0){
    if(!store.asArrival||store.asArrival.id!==st.station.id){
      store.asArrival={id:st.station.id,t:Date.now()};save();
    }
  }else if(store.asArrival){
    const stn=stations.find(s=>s.id===store.asArrival.id);
    const gone=stn&&along!=null&&along>stn.distance+0.1;
    const otherAs=st.kind==='at_as'&&st.station.id!==store.asArrival.id;
    if(gone||otherAs){store.asArrival=null;save();}
  }
  const arr=store.asArrival;
  const stn=arr?stations.find(s=>s.id===arr.id):null;
  if(!stn){el.style.display='none';return;}
  const left=(stn.breakTimeMinutes||0)*60-(Date.now()-arr.t)/1000;
  el.style.display='block';
  if(left>=0){el.classList.remove('over');el.textContent='⏱ '+stn.name+' · '+fmtHMS(left);}
  else{el.classList.add('over');el.textContent='⏱ '+stn.name+' · +'+fmtHMS(-left)+' GO';}
}

/* ---------- keep the screen awake while navigating ----------
   Navigating = race running/paused, or pre-start within 500 m of km 0
   (walking to the start line). Released when idle/finished. */
function navigating(){
  const s=clockState();
  if(s==='running'||s==='paused')return true;
  return s==='idle'&&startDistM!=null&&startDistM<=500;
}
let wakeLock=null, wakeLockBusy=false;
async function syncWakeLock(){
  if(wakeLockBusy)return;
  const want=navigating()&&!document.hidden;
  try{
    wakeLockBusy=true;
    if(want&&!wakeLock&&('wakeLock'in navigator)){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null;});
    }else if(!want&&wakeLock){
      const wl=wakeLock;wakeLock=null;await wl.release();
    }
  }catch(e){wakeLock=null;}
  finally{wakeLockBusy=false;}
}

/* ---------- sweat-proof touch lock: TWO-FINGER HOLD toggle ----------
   Field-tested: swipes and taps CAN be forged by moving sweat drops. Two
   steady fingers cannot. One gesture toggles lock AND unlock: exactly two
   touch points, >=70 px apart, held ~1 s with <30 px movement (a pinch moves,
   so zooming never locks). While locked, an invisible shield swallows every
   touch. No permanent UI; iOS users can additionally use Guided Access. */
let locked=false, lockHintTimer=null, lockToggledAt=0;
function showLockHint(msg){
  const h=document.getElementById('lockhint');
  h.textContent=msg;h.classList.add('on');
  clearTimeout(lockHintTimer);
  lockHintTimer=setTimeout(()=>h.classList.remove('on'),1600);
}
function setLock(on){
  locked=on;
  document.getElementById('lockshield').style.display=on?'block':'none';
  showLockHint(on?'🔒 locked — hold 2 fingers to unlock':'🔓 unlocked');
}
let tfStart=null, tfTimer=null;
function tfCancel(){tfStart=null;if(tfTimer){clearTimeout(tfTimer);tfTimer=null;}}
function tfArm(e){
  tfCancel();
  if(e.touches.length!==2)return;                 // sweat flicker / 3+ fingers
  const a=e.touches[0], b=e.touches[1];
  if(Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)<70)return; // two drops together
  tfStart=[{x:a.clientX,y:a.clientY},{x:b.clientX,y:b.clientY}];
  tfTimer=setTimeout(()=>{
    tfTimer=null;tfStart=null;
    lockToggledAt=Date.now();
    setLock(!locked);
  },1000);
}
document.addEventListener('touchstart',tfArm,{passive:true,capture:true});
document.addEventListener('touchend',tfArm,{passive:true,capture:true});
document.addEventListener('touchcancel',tfArm,{passive:true,capture:true});
document.addEventListener('touchmove',e=>{
  if(!tfStart||e.touches.length!==2)return;
  const a=e.touches[0], b=e.touches[1];
  if(Math.hypot(a.clientX-tfStart[0].x,a.clientY-tfStart[0].y)>30||
     Math.hypot(b.clientX-tfStart[1].x,b.clientY-tfStart[1].y)>30)tfCancel();
},{passive:true,capture:true});
// The toggle releases fingers over live controls: swallow that synthetic click.
document.addEventListener('click',e=>{
  if(Date.now()-lockToggledAt<700){e.preventDefault();e.stopPropagation();}
},true);
(()=>{
  const sh=document.getElementById('lockshield');
  sh.addEventListener('pointerdown',e=>{e.preventDefault();showLockHint('🔒 hold 2 fingers to unlock');});
  ['click','touchstart','touchmove','touchend'].forEach(t=>
    sh.addEventListener(t,e=>{e.preventDefault();e.stopPropagation();},{passive:false}));
})();

/* ---------- race controls: Start → Pause → Resume + Finish ---------- */
function renderControls(){
  const c=document.getElementById('controls'), s=clockState();
  if(s==='idle')c.innerHTML='<button class="ctl orange" data-a="start">▶&nbsp; Start</button>';
  else if(s==='running')c.innerHTML='<button class="ctl orange" data-a="pause">❚❚&nbsp; Pause</button>';
  else if(s==='paused')c.innerHTML=
    '<button class="ctl orange" data-a="resume">▶&nbsp; Resume</button>'+
    '<button class="ctl white" data-a="finish">⚑&nbsp; Finish</button>';
  else c.innerHTML=
    '<button class="ctl white" data-a="none">🏁 Finished · '+fmtHMS(raceElapsedSec()||0)+'</button>'+
    '<button class="ctl ghost" data-a="reset">reset</button>';
}
let resetArmedAt=0;
document.getElementById('controls').addEventListener('click',e=>{
  const a=e.target&&e.target.dataset&&e.target.dataset.a;
  if(!a||a==='none')return;
  const now=Date.now();
  if(a==='start'){
    store.startedAt=now;store.pausedAt=null;store.pausedMs=0;store.finishedAt=null;
    store.legMark=null;store.splitMark=null;store.asArrival=null;
    delete store.rerun;
    wwMaxM=null;wrongWay=false;lastCueSplit=null;
    spokenApproach.clear();lastAtASid=null;lastNextAS=null;
    armCompass();armAudio();
  }else if(a==='pause'){
    store.pausedAt=now;store.legMark=null;store.splitMark=null;
  }else if(a==='resume'){
    store.pausedMs=(store.pausedMs||0)+(now-(store.pausedAt||now));
    store.pausedAt=null;store.legMark=null;store.splitMark=null;
    wwMaxM=null;wrongWay=false;
    armAudio();
  }else if(a==='finish'){
    if(store.pausedAt){store.pausedMs=(store.pausedMs||0)+(now-store.pausedAt);store.pausedAt=null;}
    store.finishedAt=now;
  }else if(a==='reset'){
    // Two-tap confirm: reset erases the achieved final time.
    if(now-resetArmedAt>4000){
      resetArmedAt=now;
      e.target.textContent='tap again to reset';
      return;
    }
    resetArmedAt=0;
    // Full race-state wipe so the same route can be run again (same or another
    // day): clock, marks, position, projection, cues. The PLAN stays intact.
    delete store.startedAt;delete store.finishedAt;
    store.pausedAt=null;store.pausedMs=0;store.legMark=null;store.splitMark=null;
    store.asArrival=null;delete store.proj;
    store.rerun=true; // seedProjection pins km 0 until the next Start
    along=null;offM=null;lastProj=null;prevFixMark=null;
    wwMaxM=null;wrongWay=false;lastCueSplit=null;
    spokenApproach.clear();lastAtASid=null;lastNextAS=null;
    voiceQ=[];try{voiceEl.pause();}catch(err){}
    if(locked)setLock(false);
    panCenter=null;panUntil=0;
  }
  save();renderControls();updatePaceband();render();syncWakeLock();
  navNeedsDraw=true;
});
function mapLoop(){
  if(!mapOn)return;
  if(navMode==='heading'){
    rotTarget=headingDeg!=null?headingDeg:
      (fix&&fix.coords.heading!=null&&fix.coords.speed>0.7?fix.coords.heading:rotTarget);
  }
  drawMap();
  drawProfile();
  rafId=requestAnimationFrame(mapLoop);
}
/* map gestures: pinch zoom + momentary pan (snaps back after 5 s) */
const ptrs=new Map();
let pinchBase=null;
mapCv.addEventListener('pointerdown',e=>{
  mapCv.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){
    const [a,b]=[...ptrs.values()];
    pinchBase={d:Math.hypot(a.x-b.x,a.y-b.y),zoom:mapZoom};
  }
});
mapCv.addEventListener('pointermove',e=>{
  const prev=ptrs.get(e.pointerId);
  if(!prev)return;
  const now={x:e.clientX,y:e.clientY};
  if(ptrs.size===2&&pinchBase){
    ptrs.set(e.pointerId,now);
    const [a,b]=[...ptrs.values()];
    const d=Math.hypot(a.x-b.x,a.y-b.y);
    mapZoom=Math.max(TZ_MIN-0.4,Math.min(TZ_MAX+2.5,pinchBase.zoom+Math.log2(Math.max(.1,d/pinchBase.d))));
  }else if(ptrs.size===1){
    const dx=(now.x-prev.x)*DPR, dy=(now.y-prev.y)*DPR;
    ptrs.set(e.pointerId,now);
    const tz=Math.max(TZ_MIN,Math.min(TZ_MAX,Math.round(mapZoom)));
    const scale=Math.pow(2,mapZoom-tz)*DPR;
    // Inverse of the draw transform (rot = -rotation): the content follows
    // the finger, so the center moves by -R(+rotation)·(dx,dy)/scale.
    const th=rotation*Math.PI/180;
    const wx=-(dx*Math.cos(th)-dy*Math.sin(th))/scale;
    const wy=-(dx*Math.sin(th)+dy*Math.cos(th))/scale;
    const c=mapCenter();
    const wc=mercWorld(c.lng,c.lat,tz);
    const nx=wc.x+wx, ny=wc.y+wy;
    const n=256*Math.pow(2,tz);
    const lng=nx/n*360-180;
    const lat=Math.atan(Math.sinh(Math.PI*(1-2*ny/n)))*180/Math.PI;
    panCenter={lat,lng};
    // Reviewing at home: the pan sticks. Racing: peek + snap-back in 5 s.
    panUntil=reviewMode()?Number.MAX_SAFE_INTEGER:Date.now()+5000;
  }
  navNeedsDraw=true;
});
function releasePtr(e){ptrs.delete(e.pointerId);if(ptrs.size<2)pinchBase=null;}
mapCv.addEventListener('pointerup',releasePtr);
mapCv.addEventListener('pointercancel',releasePtr);
mapCv.addEventListener('wheel',e=>{e.preventDefault();
  mapZoom=Math.max(TZ_MIN-0.4,Math.min(TZ_MAX+2.5,mapZoom-e.deltaY*0.0018));},{passive:false});
/* top-right button toggles the nav orientation (heading-up <-> north-up) */
const modeBtn=document.getElementById('center-btn');
function syncModeBtn(){modeBtn.textContent=navMode==='heading'?'▲':'N';}
modeBtn.onclick=()=>{
  navMode=navMode==='heading'?'north':'heading';
  store.navMode=navMode;save();
  syncModeBtn();navNeedsDraw=true;
};
/* discreet voice mute right below the orientation button */
const voiceBtn=document.getElementById('voice-btn');
function syncVoiceBtn(){voiceBtn.textContent=store.voiceMuted?'🔇':'🔊';}
voiceBtn.onclick=()=>{
  store.voiceMuted=!store.voiceMuted;save();syncVoiceBtn();
  if(store.voiceMuted){
    voiceQ=[];voiceBusy=false;
    try{voiceEl.pause();}catch(e){}
    try{speechSynthesis.cancel();}catch(e){}
  }
};

/* compass heading */
function onOrient(e){
  let hd=null;
  if(typeof e.webkitCompassHeading==='number')hd=e.webkitCompassHeading;
  else if(e.absolute===true&&typeof e.alpha==='number')hd=360-e.alpha;
  if(hd!=null&&isFinite(hd))headingDeg=(hd+360)%360;
}
function armCompass(){
  const DOE=window.DeviceOrientationEvent;
  if(DOE&&typeof DOE.requestPermission==='function'){
    DOE.requestPermission().then(state=>{
      if(state==='granted'){window.addEventListener('deviceorientation',onOrient,true);}
    }).catch(()=>{});
  }else{
    window.addEventListener('deviceorientationabsolute',onOrient,true);
    window.addEventListener('deviceorientation',onOrient,true);
  }
}

/* offline tile pre-cache with progress */
async function prefetchTiles(){
  const label=document.getElementById('tile-status');
  if(!TILE_KEYS.length){label.textContent='no offline tiles in this build';return;}
  if(!('caches'in window)){label.textContent='offline maps unavailable (needs https/localhost)';return;}
  try{
    const cache=await caches.open('pp-race-app-'+RUN_ID+'-tiles');
    let done=0;
    for(let i=0;i<TILE_KEYS.length;i+=6){
      const batch=TILE_KEYS.slice(i,i+6);
      await Promise.all(batch.map(async k=>{
        const [z,x,y]=k.split('/');
        const url=new URL(tileURL(z,x,y),location.href).href;
        if(await cache.match(url)){done++;return;}
        try{const r=await fetch(url);if(r.ok)await cache.put(url,r);done++;}catch(err){}
      }));
      label.textContent='offline maps: '+Math.round(done/TILE_KEYS.length*100)+'%';
    }
    // voice clips ride the same offline cache (content-hashed names)
    const vfiles=Object.values((VOICE&&VOICE.files)||{});
    for(const vf of vfiles){
      try{
        const u=new URL(vf,location.href).href;
        if(!(await cache.match(u))){const r=await fetch(u);if(r.ok)await cache.put(u,r);}
      }catch(err){}
    }
    if(done>=TILE_KEYS.length){
      label.textContent='offline maps ready ('+TILE_KEYS.length+' tiles'+(vfiles.length?' + voice':'')+')';
      setTimeout(()=>{label.style.display='none';},6000);
    }else label.textContent='offline maps: '+done+'/'+TILE_KEYS.length;
  }catch(err){label.textContent='offline maps: cache unavailable';}
}

/* ---------- view toggle: map (default) <-> cards ---------- */
function setView(mode){
  const cards=mode==='cards';
  document.body.classList.toggle('cards',cards);
  mapOn=!cards;
  if(cards){
    renderCards();
    requestAnimationFrame(()=>{deck.scrollLeft=activeCardIdx()*deck.clientWidth;syncNav();});
    if(rafId!=null){cancelAnimationFrame(rafId);rafId=null;}
  }else{
    resizeCanvases();positionOverlays();
    if(rafId==null)rafId=requestAnimationFrame(mapLoop);
  }
}
document.getElementById('cards-btn').onclick=()=>setView('cards');
document.getElementById('map-btn').onclick=()=>setView('map');
window.addEventListener('resize',()=>{if(mapOn){resizeCanvases();positionOverlays();}});

/* ---------- day / night: automatic by local hour (no button) ---------- */
function applyTheme(){
  const hr=new Date().getHours();
  document.documentElement.classList.toggle('day',hr>=7&&hr<19);
}

/* ---------- boot ---------- */
function render(){
  updatePaceband();updateLegpill();updateBreakChip();syncWakeLock();
  if(document.body.classList.contains('cards'))renderCards();
}
applyTheme();renderControls();updateLegpill();updatePaceband();syncModeBtn();syncVoiceBtn();
setView('map');positionOverlays();startGps();prefetchTiles();
if(reviewMode())frameRoute(); // opening at home: show the whole route
document.addEventListener('pointerdown',function once(){armCompass();document.removeEventListener('pointerdown',once);},{once:true});
setInterval(()=>{applyTheme();render();},1000);
if('serviceWorker'in navigator){
  const hadController=!!navigator.serviceWorker.controller;
  navigator.serviceWorker.register('sw.js',{scope:'./',updateViaCache:'none'}).then(reg=>{
    reg.update().catch(()=>{});
    document.addEventListener('visibilitychange',()=>{
      if(!document.hidden)reg.update().catch(()=>{});
    });
  }).catch(()=>{});
  let swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    // A NEW version took control (not the very first install): swap to the
    // fresh content once, so installed Home Screen apps update on open.
    if(!hadController||swReloaded)return;
    swReloaded=true;
    location.reload();
  });
}
